<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Factory Basic Web Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            padding: 50px;
        }
        h1 {
            color: #333;
        }
        p {
            color: #666;
        }
        .clock-container {
            display: inline-block;
            margin-top: 60px;
            padding: 22px 34px;
            border-radius: 18px;
            background: rgba(20, 20, 28, 0.86);
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow:
                0 18px 45px rgba(0, 0, 0, 0.24),
                inset 0 1px 0 rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
        }
        .digital-clock {
            margin: 0;
            color: #7df9ff;
            font-family: "Courier New", Courier, monospace;
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-shadow:
                0 0 8px rgba(125, 249, 255, 0.75),
                0 0 18px rgba(125, 249, 255, 0.45);
        }
    </style>
</head>
<body>
    <h1>AI Factory Basic Web Demo</h1>
    <p>This is a basic web application to test the AI Factory HQ pipeline.</p>

    <div class="clock-container" aria-label="Live digital clock">
        <p id="digital-clock" class="digital-clock">00:00:00</p>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            document.getElementById('digital-clock').textContent = `${hours}:${minutes}:${seconds}`;
        }

        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
